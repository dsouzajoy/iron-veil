<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- CRT phosphor-green targeting reticle for IRON VEIL -->
  <rect width="32" height="32" rx="4" fill="#080808"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00ff41" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#00ff41" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00ff41"/>
  <!-- Crosshair: top -->
  <line x1="16" y1="2" x2="16" y2="9" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crosshair: bottom -->
  <line x1="16" y1="23" x2="16" y2="30" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crosshair: left -->
  <line x1="2" y1="16" x2="9" y2="16" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crosshair: right -->
  <line x1="23" y1="16" x2="30" y2="16" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Upward interceptor tick at top (missile icon) -->
  <polygon points="16,3 14.5,7 17.5,7" fill="#00ff41" opacity="0.85"/>
</svg>
